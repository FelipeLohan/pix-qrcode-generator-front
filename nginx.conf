worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  gzip            on;
  gzip_comp_level 5;
  gzip_min_length 256;
  gzip_proxied    any;
  gzip_types
    application/javascript
    application/json
    text/css
    text/plain
    image/svg+xml;

  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header Referrer-Policy        "strict-origin" always;

    # Assets estáticos — cache imutável de 1 ano
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|webp|ico)$ {
      root /usr/share/nginx/html;
      expires 1y;
      add_header Cache-Control "public, immutable";
      try_files $uri =404;
    }

    # Proxy reverso para o backend Spring Boot
    # BACKEND_URL é substituída pelo sed no docker-entrypoint.sh
    location /api/ {
      proxy_pass         BACKEND_URL;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # SPA fallback — Angular Router
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
    }
  }
}
